apiVersion: v1
kind: Service
metadata:
  name: {{ include "autoaudit.fullname" . }}-redis
  labels:
    {{- include "autoaudit.componentLabels" (dict "context" . "component" "redis") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: tcp-redis
      port: 6379
      targetPort: tcp-redis
      protocol: TCP
  selector:
    {{- include "autoaudit.selectorLabels" (dict "context" . "component" "redis") | nindent 4 }}
