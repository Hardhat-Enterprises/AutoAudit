{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "autoaudit.fullname" . }}
  labels:
    {{- include "autoaudit.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ required "gateway.parentRef.name is required when gateway is enabled" .Values.gateway.parentRef.name }}
      {{- if .Values.gateway.parentRef.namespace }}
      namespace: {{ .Values.gateway.parentRef.namespace }}
      {{- end }}
  {{- if .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml .Values.gateway.hostnames | nindent 4 }}
  {{- end }}
  rules:
    # API route: /api/* -> backend-api (with /api prefix stripped)
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: {{ include "autoaudit.fullname" . }}-backend-api
          port: {{ .Values.backendApi.service.port }}
    # Frontend catch-all: /* -> frontend
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "autoaudit.fullname" . }}-frontend
          port: {{ .Values.frontend.service.port }}
{{- end }}
