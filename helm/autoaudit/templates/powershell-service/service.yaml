apiVersion: v1
kind: Service
metadata:
  name: {{ include "autoaudit.fullname" . }}-powershell-service
  labels:
    {{- include "autoaudit.componentLabels" (dict "context" . "component" "powershell-service") | nindent 4 }}
spec:
  type: {{ .Values.powershellService.service.type }}
  ports:
    - name: http
      port: {{ .Values.powershellService.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "autoaudit.selectorLabels" (dict "context" . "component" "powershell-service") | nindent 4 }}
