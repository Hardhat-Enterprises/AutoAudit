apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "autoaudit.fullname" . }}-postgresql
  labels:
    {{- include "autoaudit.componentLabels" (dict "context" . "component" "postgresql") | nindent 4 }}
spec:
  serviceName: {{ include "autoaudit.fullname" . }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      {{- include "autoaudit.selectorLabels" (dict "context" . "component" "postgresql") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "autoaudit.componentLabels" (dict "context" . "component" "postgresql") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "autoaudit.serviceAccountName" . }}
      {{- include "autoaudit.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: postgresql
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          ports:
            - name: tcp-postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "autoaudit.secretName" . }}
                  key: postgresql-password
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.user | quote }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.postgresql.user | quote }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          {{- with .Values.postgresql.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.postgresql.persistence.storageClass }}
        storageClassName: {{ .Values.postgresql.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgresql.persistence.size | quote }}
