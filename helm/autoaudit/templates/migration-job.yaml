{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "autoaudit.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "autoaudit.componentLabels" (dict "context" . "component" "migration") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "autoaudit.selectorLabels" (dict "context" . "component" "migration") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "autoaudit.serviceAccountName" . }}
      {{- include "autoaudit.imagePullSecrets" . | nindent 6 }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "autoaudit.image" (dict "registry" .Values.global.imageRegistry "repository" .Values.backendApi.image.repository "tag" (.Values.backendApi.image.tag | default .Chart.AppVersion)) }}
          imagePullPolicy: {{ .Values.backendApi.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              echo "Running database migrations..."
              uv run alembic upgrade head
              echo "Seeding default admin user..."
              uv run python -m app.db.init_db
              echo "Migration complete."
          env:
            {{- include "autoaudit.backendApi.env" . | nindent 12 }}
{{- end }}
