name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to simulate (for manual testing)"
        required: true
        default: "140"

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — Build & deploy frontend to Netlify
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      netlify-url: ${{ steps.deploy.outputs.deploy-url }}
      pr-number: ${{ steps.pr.outputs.number }}

    steps:
      - name: Resolve PR number
        id: pr
        run: |
          echo "number=${{ github.event.number || inputs.pr_number }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          # will be replaced when backend preview is added
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Deploy to Netlify
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: frontend/dist
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR #${{ steps.pr.outputs.number }} — ${{ github.event.pull_request.title }}"
          alias: pr-${{ steps.pr.outputs.number }}
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.PREVIEW_NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.PREVIEW_NETLIFY_SITE_ID }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — Build & push backend image to GHCR (parallel with job 1)
  # ─────────────────────────────────────────────────────────────────────────────
  build-push-backend-image:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          PR_NUM=${{ github.event.number || inputs.pr_number }}
          echo "image-tag=ghcr.io/${{ github.repository_owner }}/autoaudit-backend:pr-${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        run: |
          docker build \
            -f backend-api/Dockerfile \
            -t "${{ steps.meta.outputs.image-tag }}" \
            .
          docker push "${{ steps.meta.outputs.image-tag }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 — Post / update PR comment with preview URL
  # ─────────────────────────────────────────────────────────────────────────────
  post-preview-comment:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-push-backend-image]
    if: always() && needs.build-frontend.result == 'success'

    steps:
      - name: Find existing preview comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ needs.build-frontend.outputs.pr-number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- autoaudit-preview -->"

      - name: Create or update preview comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ needs.build-frontend.outputs.pr-number }}
          edit-mode: replace
          body: |
            <!-- autoaudit-preview -->
            ## Preview Environment

            | | URL |
            |---|---|
            | Frontend | ${{ needs.build-frontend.outputs.netlify-url }} |

            > Last updated: ${{ github.sha }} · [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
